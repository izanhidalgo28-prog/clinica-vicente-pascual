<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Vicente Pascual — Asistente Virtual</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f7f4;min-height:100vh;display:flex;align-items:center;justify-content:center}
.hero{text-align:center;padding:40px 20px}
.hero h1{font-size:26px;color:#1a6b4a;margin-bottom:10px}
.hero p{font-size:15px;color:#555;margin-bottom:6px}
.arrow{font-size:44px;margin-top:24px;animation:bounce 1.5s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
#cb-bubble{position:fixed;bottom:28px;right:28px;width:60px;height:60px;border-radius:50%;background:#1a6b4a;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(26,107,74,.5);z-index:9999;transition:transform .2s}
#cb-bubble:hover{transform:scale(1.1)}
#cb-bubble svg{width:28px;height:28px;fill:white}
#cb-box{position:fixed;bottom:100px;right:28px;width:340px;height:520px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);z-index:9998;display:none;flex-direction:column;overflow:hidden}
#cb-box.open{display:flex}
#cb-head{background:#1a6b4a;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.h-av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px}
.h-info .nm{color:#fff;font-size:14px;font-weight:600;margin:0}
.h-info .st{color:rgba(255,255,255,.75);font-size:11px;margin:2px 0 0}
#cb-close{margin-left:auto;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
#cb-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#f5faf7}
.msg{max-width:83%;display:flex;flex-direction:column;gap:2px}
.msg.b{align-self:flex-start}.msg.u{align-self:flex-end}
.bbl{padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.5}
.msg.b .bbl{background:#fff;border:1px solid #d0e8d8;color:#1a1a1a;border-bottom-left-radius:3px}
.msg.u .bbl{background:#1a6b4a;color:#fff;border-bottom-right-radius:3px}
.tm{font-size:10px;color:#aab;padding:0 3px}
.msg.b .tm{align-self:flex-start}.msg.u .tm{align-self:flex-end}
#cb-qr{padding:8px 12px 5px;display:flex;flex-wrap:wrap;gap:5px;background:#fff;border-top:1px solid #e8f5ee;flex-shrink:0}
.qb{background:none;border:1.5px solid #1a6b4a;color:#1a6b4a;border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer}
.qb:hover{background:#e8f5ee}
#cb-form{display:flex;gap:8px;padding:10px 12px;background:#fff;border-top:1px solid #e8f5ee;flex-shrink:0}
#cb-input{flex:1;border:1.5px solid #c8e0d0;border-radius:20px;padding:8px 14px;font-size:13px;outline:none}
#cb-input:focus{border-color:#1a6b4a}
#cb-send{background:#1a6b4a;color:#fff;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#cb-send svg{width:16px;height:16px;fill:white}
.dot{width:6px;height:6px;border-radius:50%;background:#bbb;animation:dt 1.2s infinite;display:inline-block;margin:0 2px}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.form-cita{background:#fff;border:1px solid #d0e8d8;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;width:100%}
.form-cita h4{font-size:13px;font-weight:600;color:#1a6b4a;margin:0}
.form-cita input,.form-cita select{width:100%;border:1px solid #c8e0d0;border-radius:8px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit}
.form-cita input:focus,.form-cita select:focus{border-color:#1a6b4a}
.form-cita button{background:#1a6b4a;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.form-cita button:disabled{background:#aaa;cursor:not-allowed}
</style>
</head>
<body>
<div class="hero">
  <h1>Clínica Vicente Pascual</h1>
  <p>Fisioterapia · Osteopatía · Podología</p>
  <p style="color:#1a6b4a;font-weight:600">Asistente virtual disponible 24/7</p>
  <div class="arrow">👇</div>
</div>

<div id="cb-bubble">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</div>

<div id="cb-box">
  <div id="cb-head">
    <div class="h-av">🏥</div>
    <div class="h-info">
      <p class="nm">Clínica Vicente Pascual</p>
      <p class="st">En línea · responde al instante</p>
    </div>
    <button id="cb-close">&times;</button>
  </div>
  <div id="cb-msgs"></div>
  <div id="cb-qr"></div>
  <div id="cb-form">
    <input id="cb-input" type="text" placeholder="Escribe tu mensaje..."/>
    <button id="cb-send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>

<script>
var SHEETS_URL='https://script.google.com/macros/s/AKfycbxNJTkjcBXCG7JGMWNPy1pqglZiHOwqek8nBUu9xYGB3X0gm-soUohxkEnIKx8opORy/exec';
var QR=['Pedir cita','Servicios disponibles','Dónde estáis','Llamar ahora'];
var chatHistory=[],busy=false,started=false;

function now(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}
function addMsg(txt,who){var m=document.getElementById('cb-msgs'),d=document.createElement('div');d.className='msg '+who;d.innerHTML='<div class="bbl">'+txt+'</div><span class="tm">'+now()+'</span>';m.appendChild(d);m.scrollTop=m.scrollHeight;}
function showTyping(){var m=document.getElementById('cb-msgs'),d=document.createElement('div');d.className='msg b';d.id='cb-ty';d.innerHTML='<div class="bbl"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';m.appendChild(d);m.scrollTop=m.scrollHeight;}
function hideTyping(){var e=document.getElementById('cb-ty');if(e)e.remove();}
function setQR(){var q=document.getElementById('cb-qr');q.innerHTML='';QR.forEach(function(r){var b=document.createElement('button');b.className='qb';b.textContent=r;b.onclick=function(){doSend(r)};q.appendChild(b);});}

function addForm(){
  var m=document.getElementById('cb-msgs');
  var d=document.createElement('div');
  d.className='msg b';d.style.maxWidth='100%';
  d.innerHTML='<div class="form-cita">'+
    '<h4>Solicitar cita</h4>'+
    '<input id="f-nombre" type="text" placeholder="Nombre completo"/>'+
    '<input id="f-telefono" type="tel" placeholder="Teléfono"/>'+
    '<select id="f-servicio"><option value="">Servicio...</option><option>Fisioterapia</option><option>Osteopatía</option><option>Podología</option><option>No sé, necesito orientación</option></select>'+
    '<input id="f-dia" type="text" placeholder="Día preferido (ej: martes)"/>'+
    '<select id="f-hora"><option value="">Horario preferido...</option><option>Mañana (8am–12pm)</option><option>Tarde (12pm–4pm)</option><option>Última hora (4pm–8pm)</option></select>'+
    '<button id="f-btn" onclick="enviarCita()">Solicitar cita</button>'+
  '</div>';
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function enviarCita(){
  var nombre=document.getElementById('f-nombre').value.trim();
  var telefono=document.getElementById('f-telefono').value.trim();
  var servicio=document.getElementById('f-servicio').value;
  var dia=document.getElementById('f-dia').value.trim();
  var hora=document.getElementById('f-hora').value;
  if(!nombre||!telefono||!servicio||!dia||!hora){alert('Por favor rellena todos los campos.');return;}
  var btn=document.getElementById('f-btn');
  btn.disabled=true;btn.textContent='Enviando...';
  fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:nombre,telefono:telefono,tratamiento:servicio,dia:dia,hora:hora})})
  .then(function(){
    btn.textContent='Cita solicitada';
    addMsg('Perfecto '+nombre+', hemos recibido tu solicitud de '+servicio+' para el '+dia+'. Te llamaremos al '+telefono+' para confirmar la cita. Cualquier duda llámanos al 966 20 21 22.','b');
  }).catch(function(){
    btn.disabled=false;btn.textContent='Solicitar cita';
    addMsg('Hubo un error. Llámanos directamente al 966 20 21 22.','b');
  });
}

async function doSend(txt){
  if(busy||!txt.trim())return;
  busy=true;
  document.getElementById('cb-qr').innerHTML='';
  if(txt==='Llamar ahora'){addMsg('Puedes llamarnos al 966 20 21 22. Estaremos encantados de atenderte.','b');busy=false;return;}
  if(txt==='Dónde estáis'){addMsg('Estamos en Av. Alicante, nº46, Elche (Alicante). Puedes llamarnos al 966 20 21 22 o escribirnos a clinica.vicentepascual@gmail.com','b');busy=false;return;}
  addMsg(txt,'u');
  chatHistory.push({role:'user',content:txt});
  if(txt.toLowerCase().indexOf('cita')>-1||txt.toLowerCase().indexOf('pedir')>-1||txt.toLowerCase().indexOf('reservar')>-1){
    showTyping();
    setTimeout(function(){hideTyping();addMsg('Rellena el formulario y te contactamos para confirmar:','b');addForm();busy=false;},600);
    return;
  }
  showTyping();
  try{
    var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory})});
    var d=await r.json();
    hideTyping();
    var reply=d.reply||'Lo siento, hubo un error.';
    addMsg(reply,'b');
    chatHistory.push({role:'assistant',content:reply});
  }catch(e){hideTyping();addMsg('Error de conexión. Llámanos al 966 20 21 22.','b');}
  busy=false;
}

document.getElementById('cb-bubble').onclick=function(){
  var box=document.getElementById('cb-box');
  if(box.classList.contains('open')){box.classList.remove('open');}
  else{box.classList.add('open');if(!started){started=true;addMsg('Hola, bienvenido a Clínica Vicente Pascual. Soy tu asistente virtual. ¿En qué te puedo ayudar?','b');setQR();}}
};
document.getElementById('cb-close').onclick=function(e){e.stopPropagation();document.getElementById('cb-box').classList.remove('open');};
document.getElementById('cb-send').onclick=function(){var v=document.getElementById('cb-input').value.trim();if(v){doSend(v);document.getElementById('cb-input').value='';}};
document.getElementById('cb-input').onkeydown=function(e){if(e.key==='Enter'){var v=e.target.value.trim();if(v){doSend(v);e.target.value='';}}}; 
</script>
</body>
</html>
